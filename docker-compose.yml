services:
  postgres:
    image: postgres:16-alpine
    container_name: knowledge_compiler_db
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge_compiler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge_compiler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
